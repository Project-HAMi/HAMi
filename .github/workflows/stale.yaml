name: 'Close stale issues and PRs'
on:
  schedule:
    - cron: '0 0 * * 2'

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 365
          stale-issue-message: 'This issue is stale because it has been open 365 days with no activity. Remove stale label or comment or this will be closed in 7 days.'
          days-before-issue-close: 7
          close-issue-message: 'This issue was closed because it has been stalled for 7 days with no activity.'
          days-before-pr-stale: 365
          stale-pr-message: 'This PR is stale because it has been open 365 days with no activity. Remove stale label or comment or this will be closed in 14 days.'
          days-before-pr-close: 14
          close-pr-message: 'This PR was closed because it has been stalled for 14 days with no activity.'
          exempt-issue-labels: pinned,wip,security,notice
          exempt-draft-pr: true
          enable-statistics: true
          ascending: true
          operations-per-run: 300
