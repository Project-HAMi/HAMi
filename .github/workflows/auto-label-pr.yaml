name: "PR Labeler"
on:
  pull_request_target:
    types: [opened, edited]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
   labeling:
    runs-on: ubuntu-latest
    steps:
    - uses: github/issue-labeler@c1b0f9f52a63158c4adc09425e858e87b32e9685 # v3.4
      with:
        configuration-path: .github/labeler.yml
        enable-versioned-regex: 0
        sync-labels: 1
        include-title: 1
        include-body: 0
        repo-token: ${{ github.token }}
