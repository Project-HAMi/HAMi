name: Call e2e test

on:
  workflow_call:
    inputs:
      ref:
        description: 'Reference id to run tests against'
        required: true
        type: string
#      environment:
#        required: true

permissions: write-all

jobs:
  e2e:
    strategy:
      matrix:
        env: [nvidia, ascend]
    runs-on: ${{ matrix.env }}
    environment: ${{ matrix.env }}
    steps:
      - name: Debug Vars and Inputs
        env:
          COFFEE: ${{ vars.COFFEE_TYPE }}
          RUNNER: ${{ vars.RUNNER }}
          REF: ${{ inputs.ref }}
        run: |
          echo "REF: $REF"
          echo "COFFEE: $COFFEE"
          echo "RUNNER: $RUNNER"


