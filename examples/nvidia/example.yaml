apiVersion: apps/v1
kind: Deployment
metadata:
  name: cuda-sample-vector-add
  labels:
    app: cuda-sample-vector-add
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cuda-sample-vector-add
  template:
    metadata:
      labels:
        app: cuda-sample-vector-add
    spec:
      containers:
        - name: cuda-sample-vector-add
          image: nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda12.5.0-ubuntu22.04
          command:
            - /bin/bash
            - "-c"
            - "--"
          args:
            - while true; do /cuda-samples/vectorAdd; done
          resources:
            limits:
              nvidia.com/gpu: 1 # declare how many physical GPUs the pod needs
              nvidia.com/gpumem: 3000 # Each vGPU contains 3000M device memory （Optional,Integer）
              # nvidia.com/gpucores: 10 # identifies 10% GPU GPU core each physical GPU allocates to the pod
              # nvidia.com/priority: 0 # we only have two priority class, 0(high) and 1(low), default: 1
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
